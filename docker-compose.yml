services:
  postgres:
    image: postgres:17-alpine
    container_name: myworkout-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: myworkout
      POSTGRES_PASSWORD: myworkout
      POSTGRES_DB: myworkout_dev
    volumes:
      - myworkout_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U myworkout -d myworkout_dev']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  myworkout_pg_data:
